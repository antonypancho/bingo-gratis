<!-- LISTA DE JUGADORES POR BINGO -->
<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

let listaGlobal = { aprobados: [], pendientes: [] };
const botonesBingos = document.getElementById("botonesBingos");

/* CARGAR BOTONES DE BINGOS */
async function cargarBotonesBingos() {
  const snap = await getDocs(collection(db, "bingos"));
  botonesBingos.innerHTML = "";

  snap.forEach((d) => {
    const b = d.data();

    const btn = document.createElement("button");
    btn.className = "bingo-btn-login";
    btn.innerHTML = `🔮 ${b.descripcion}`;
    btn.onclick = () => abrirListaPorBingo(d.id, b.descripcion);

    botonesBingos.appendChild(btn);
  });
}

cargarBotonesBingos();

/* ABRIR LISTA FILTRADA POR BINGO */
window.abrirListaPorBingo = async function (idBingo, nombreBingo) {
  const snap = await getDocs(collection(db, "compras"));

  let aprobados = [];
  let pendientes = [];

  snap.forEach((d) => {
    const data = d.data();

    if (data.idBingo !== idBingo) return;

    if (data.estado === "aprobado") {
      data.cartones.forEach((num) => {
        aprobados.push({ numero: num, nombre: data.usuario });
      });
    }

    if (data.estado === "pendiente") {
      pendientes.push({ nombre: data.usuario, cartones: data.cartones });
    }
  });

  aprobados.sort((a, b) => a.numero - b.numero);

  listaGlobal = { aprobados, pendientes };

  renderLista(aprobados, pendientes);

  document.getElementById("modalLista").style.display = "flex";
};

/* RENDER LISTA */
function renderLista(aprobados, pendientes) {
  let texto = "";

  texto += "✔ Personas aprobadas:\n\n";
  if (aprobados.length === 0) texto += "  Ninguna\n";
  else aprobados.forEach((item) => texto += `${item.numero} ${item.nombre}\n`);

  texto += "\n⏳ Personas pendientes:\n\n";
  if (pendientes.length === 0) texto += "  Ninguna\n";
  else pendientes.forEach((p, i) => texto += `${i + 1}. ${p.nombre} — Cartones: ${p.cartones.join(", ")}\n`);

  document.getElementById("listaContenido").innerText = texto;
}

/* BUSCADOR */
window.filtrarLista = function () {
  const texto = document.getElementById("buscador").value.toLowerCase();
  const { aprobados, pendientes } = listaGlobal;

  const filtradosAprobados = aprobados.filter(item =>
    item.nombre.toLowerCase().includes(texto) ||
    String(item.numero).includes(texto)
  );

  const filtradosPendientes = pendientes.filter(item =>
    item.nombre.toLowerCase().includes(texto)
  );

  renderLista(filtradosAprobados, filtradosPendientes);
};

window.cerrarLista = function () {
  document.getElementById("modalLista").style.display = "none";
};
</script>

<!-- LOGIN SCRIPT -->
<script type="module">
import { db } from "./firebase.js";
import { collection, getDocs, addDoc, updateDoc, doc, Timestamp } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.addEventListener("load", () => {
    const nombre = localStorage.getItem("nombre");
    const telefono = localStorage.getItem("telefono");

    if (nombre) {
        document.getElementById("nombre").value = nombre;
        document.getElementById("nombre").readOnly = true;
    }

    if (telefono) {
        document.getElementById("telefono").value = telefono;
        document.getElementById("telefono").readOnly = true;
    }
});

window.editarCampo = function (id) {
    const input = document.getElementById(id);
    input.readOnly = false;
    input.focus();
};

window.entrar = async function () {
    const nombre = document.getElementById("nombre").value.trim();
    const telefono = document.getElementById("telefono").value.trim();

    if (!nombre || !telefono) {
        alert("Debes llenar todos los campos.");
        return;
    }

    const snap = await getDocs(collection(db, "usuarios"));
    let existe = false;
    let idExistente = null;

    snap.forEach(docu => {
        if (docu.data().telefono === telefono) {
            existe = true;
            idExistente = docu.id;
        }
    });

    if (existe) {
        await updateDoc(doc(db, "usuarios", idExistente), {
            nombre: nombre,
            telefono: telefono
        });
    } else {
        await addDoc(collection(db, "usuarios"), {
            nombre: nombre,
            telefono: telefono,
            fecha: Timestamp.now()
        });
    }

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("telefono", telefono);

    window.location.href = "comprar.html";
}
</script>
